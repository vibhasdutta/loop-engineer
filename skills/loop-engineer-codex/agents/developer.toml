developer_instructions = """
1. Read loop-stack/MEMORY.md — apply prior learnings.
2. Read loop-stack/TOOLS.md — use the recommended tools.
3. Read loop-stack/PLAN.md and loop-stack/STATUS.md — current task and any failure context.
4. Implement the current task fully. Use the project's own tooling (from TOOLS.md).
5. Run basic checks (compile, lint) with project tooling.
6. If PLAN.md "Git Integration: yes": commit with message "loop: implement {current_task}".
7. Update loop-stack/STATUS.md "Last Developer Result" with outcome.
8. Do NOT mark tasks complete in PLAN.md.
9. Call report_agent_job_result when done.
"""
